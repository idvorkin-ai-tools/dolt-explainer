<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="413px" preserveAspectRatio="none" style="width:401px;height:413px;background:#FFFFFF;" version="1.1" viewBox="0 0 401 413" width="401px" zoomAndPan="magnify"><title>SQLite-in-git: git treats the DB as a binary blob</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="373.8574" x="10" y="22.9951">SQLite-in-git: git treats the DB as a binary blob</text></g><!--entity A--><g class="entity" data-qualified-name="A" data-source-line="12" id="ent0002"><rect fill="#D9EDFF" height="68.8906" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="137.6533" x="48.6043" y="44.2969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="55.4668" x="58.6043" y="67.292">Agent A</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="88.71" x="58.6043" y="83.5889">bd create 'X'</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="117.6533" x="58.6043" y="99.8857">commit db.sqlite</text></g><!--entity B--><g class="entity" data-qualified-name="B" data-source-line="13" id="ent0003"><rect fill="#D9EDFF" height="68.8906" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="137.6533" x="221.6043" y="44.2969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="55.4941" x="231.6043" y="67.292">Agent B</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="87.6709" x="231.6043" y="83.5889">bd create 'Y'</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="117.6533" x="231.6043" y="99.8857">commit db.sqlite</text></g><!--entity M--><g class="entity" data-qualified-name="M" data-source-line="15" id="ent0004"><rect fill="#F5C2C7" height="117.7813" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="170.9648" x="117.9443" y="173.1869"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="112.4854" x="127.9443" y="196.182">git merge A + B</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="127.9443" y="212.4789">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="129.2197" x="127.9443" y="228.7757">CONFLICT (binary)</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="150.9648" x="127.9443" y="245.0726">- take A: lose B's task</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="150.9648" x="127.9443" y="261.3695">- take B: lose A's task</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="139.0225" x="127.9443" y="277.6664">- merge: impossible</text></g><g class="entity" data-qualified-name="GMN7" data-source-line="21" id="ent0008"><path d="M13.9343,350.9669 L13.9343,406.3653 A0,0 0 0 0 13.9343,406.3653 L392.9231,406.3653 A0,0 0 0 0 392.9231,406.3653 L392.9231,360.9669 L382.9231,350.9669 L207.4243,350.9669 L203.4243,291.0569 L199.4243,350.9669 L13.9343,350.9669 A0,0 0 0 0 13.9343,350.9669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M382.9231,350.9669 L382.9231,360.9669 L392.9231,360.9669 L382.9231,350.9669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="289.4912" x="19.9343" y="368.0338">git stores the whole .sqlite file each commit.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="317.313" x="19.9343" y="383.1666">A meaningful diff at the row level does not exist.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="357.9888" x="19.9343" y="398.2994">Two concurrent writers = manual recovery every time.</text></g><!--link A to M--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="17" id="lnk5"><path d="M136.5143,113.3269 C146.4643,130.8269 155.9512,147.5196 167.4012,167.6796" fill="none" id="A-to-M" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="170.3643,172.8969,169.3977,163.0956,167.895,168.5492,162.4414,167.0465,170.3643,172.8969" style="stroke:#181818;stroke-width:1;"/></g><!--link B to M--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="18" id="lnk6"><path d="M271.1243,113.3269 C261.0543,130.8269 251.4548,147.5352 239.8648,167.6952" fill="none" id="B-to-M" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="236.8743,172.8969,244.8278,167.088,239.3664,168.5622,237.8922,163.1008,236.8743,172.8969" style="stroke:#181818;stroke-width:1;"/></g><?plantuml-src TPBVYzH03CVVvwy8Um-hIFT1SCK5XRPhKRWxKUz1OL_IDcs7dIRdpEnM4V_tIzlbh1osCBJv9f_yc4GR7S7NpzSsKc8vQMtSWHuGFM4C43k2VGOO0A6qZFuNb4vAOyBHyZrwxA4NbghpqXCqw08jfD1XBOFbzebIKuCd5mlXU8iQkVf0xapHLhXQU7cg8dAh5Vuse4-6rR7rSk8w5oSUhefqV6TDV4t-OjzkjvFno-phcJnipHzZ_X9NQKiS8JrmMKCrTakm_hO-S2LzhmEeoqtuuNGigx7x5AxsRzxlY-8f8Vk7yFr_XEoHi4ICe-x9jwGPNeoe0-UVRelhZ_aTF9i7_lp02KGygiiEd0I2RAqNW-7uA6GN8Lq84tK7jh-N46pfvYfkT6QlyfVvQsDIIFHoE7a7DoPRV1iMRQIK6AK7QTG2qqQ4A9xcZHWwqU8ltK5ZzOUmwc1kVAC1gUP7rfjlJWvgspI0SGhrCe2ZCwbLbAQvW7xQC0NT3Q88haxUZuCTlD9zWBVG8v_GZUiWPz8LfEcCjgUD8Qv72fa7?></g></svg>