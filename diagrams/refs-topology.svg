on fill="#EAF3FF" points="16,53.2969,26,43.2969,180.79,43.2969,180.79,95.8906,170.79,105.8906,16,105.8906,16,53.2969" style="stroke:#0969DA;stroke-width:0.5;"/><line style="stroke:#0969DA;stroke-width:0.5;" x1="170.79" x2="180.79" y1="53.2969" y2="43.2969"/><line style="stroke:#0969DA;stroke-width:0.5;" x1="16" x2="170.79" y1="53.2969" y2="53.2969"/><line style="stroke:#0969DA;stroke-width:0.5;" x1="170.79" x2="170.79" y1="53.2969" y2="105.8906"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="109.9082" x="31" y="76.292">GitHub web UI /</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="124.79" x="31" y="92.5889">vanilla `git clone`</text></g><!--entity DOLT_CLONE--><g class="entity" data-qualified-name="DOLT_CLONE" data-source-line="25" id="ent0006"><polygon fill="#EAF3FF" points="299.94,61.4469,309.94,51.4469,422.8599,51.4469,422.8599,87.7437,412.8599,97.7437,299.94,97.7437,299.94,61.4469" style="stroke:#0969DA;stroke-width:0.5;"/><line style="stroke:#0969DA;stroke-width:0.5;" x1="412.8599" x2="422.8599" y1="61.4469" y2="51.4469"/><line style="stroke:#0969DA;stroke-width:0.5;" x1="299.94" x2="412.8599" y1="61.4469" y2="61.4469"/><line style="stroke:#0969DA;stroke-width:0.5;" x1="412.8599" x2="412.8599" y1="61.4469" y2="97.7437"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="82.9199" x="314.94" y="84.442">`dolt clone`</text></g><g class="entity" data-qualified-name="GMN10" data-source-line="32" id="ent0011"><path d="M382.16,463.9669 L382.16,519.3653 L718.6258,519.3653 L718.6258,473.9669 L708.6258,463.9669 L382.16,463.9669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M708.6258,463.9669 L708.6258,473.9669 L718.6258,473.9669 L708.6258,463.9669" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="315.4658" x="388.16" y="481.0338">Same bytes, same URL, two different realities &#8212;</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="274.9233" x="388.16" y="496.1666">because GitHub's UI (and `git clone`) only</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="264.6909" x="388.16" y="511.2994">follows `refs/heads/*`, not arbitrary refs.</text></g><!--link BROWSER to HEADS--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="dependency" data-source-line="27" id="lnk7"><path d="M97.9,106.1169 C98.74,124.8169 101.89,148.7569 111.4,167.8869 C130.45,206.2669 158.6769,236.8532 188.5269,263.0032" fill="none" id="BROWSER-to-HEADS" style="stroke:#0969DA;stroke-width:1;"/><polygon fill="#0969DA" points="193.04,266.9569,188.9061,258.0176,189.2791,263.6621,183.6345,264.0351,193.04,266.9569" style="stroke:#0969DA;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="119.647" x="112.4" y="148.9538">reads refs/heads/*</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="33.9219" x="155.2625" y="164.0866">sees:</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="95.5322" x="82.7762" y="256.1755">just a README</text></g><!--link DOLT_CLONE to DOLT--><g class="link" data-entity-1="ent0006" data-entity-2="ent0004" data-link-type="dependency" data-source-line="28" id="lnk8"><path d="M382.02,98.0969 C390.79,108.8269 400.38,122.2669 406.4,135.8869 C422.37,172.0569 430.2818,209.5102 435.0118,244.7502" fill="none" id="DOLT_CLONE-to-DOLT" style="stroke:#C0A02E;stroke-width:1;"/><polygon fill="#C0A02E" points="435.81,250.6969,438.5772,241.2447,435.1449,245.7413,430.6483,242.309,435.81,250.6969" style="stroke:#C0A02E;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" leng