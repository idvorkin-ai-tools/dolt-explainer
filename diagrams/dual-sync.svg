lified-name="GMN17" data-source-line="39" id="ent0018"><path d="M574.6,225.6169 L574.6,296.1481 L784.7284,296.1481 L784.7284,235.6169 L774.7284,225.6169 L574.6,225.6169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M774.7284,225.6169 L774.7284,235.6169 L784.7284,235.6169 L774.7284,225.6169" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="153.6577" x="580.6" y="242.6838">No upstream for beads.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="181.7461" x="580.6" y="257.8166">The fork is the authoritative</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="189.1284" x="580.6" y="272.9494">task DB. Many writers merge</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="77.3208" x="580.6" y="288.0822">row-by-row.</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="46" id="ent0021"><path d="M6,425.2169 L6,495.7481 L359.3188,495.7481 L359.3188,435.2169 L349.3188,425.2169 L6,425.2169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M349.3188,425.2169 L349.3188,435.2169 L359.3188,435.2169 L349.3188,425.2169" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="226.7065" x="12" y="442.2838">Two refs, two workflows, one repo.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="201.9189" x="12" y="457.4166">Code: fork -&gt; upstream via PR.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="318.0938" x="12" y="472.5494">Beads: fork-only, many writers, row-level merge.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLeng