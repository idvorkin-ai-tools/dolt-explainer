<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="264px" preserveAspectRatio="none" style="width:904px;height:264px;background:#FFFFFF;" version="1.1" viewBox="0 0 904 264" width="904px" zoomAndPan="magnify"><title>Rollback: task state is version-controlled like code</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="399.5947" x="245.5327" y="22.9951">Rollback: task state is version-controlled like code</text></g><!--entity T1--><g class="entity" data-qualified-name="T1" data-source-line="12" id="ent0002"><rect fill="#D9EDFF" height="68.8906" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="157.3955" x="91.23" y="52.4469"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="74.3135" x="101.23" y="75.442">Mon 09:00</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="80.9717" x="101.23" y="91.7389">`bd create`</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="137.3955" x="101.23" y="108.0357">bd-42: Fix auth bug</text></g><!--entity T2--><g class="entity" data-qualified-name="T2" data-source-line="13" id="ent0003"><rect fill="#D9EDFF" height="52.5938" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="235.9063" x="283.98" y="60.5969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="74.3135" x="293.98" y="83.592">Mon 14:00</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="215.9063" x="293.98" y="99.8889">`bd update bd-42 in_progress`</text></g><!--entity BAD--><g class="entity" data-qualified-name="BAD" data-source-line="14" id="ent0004"><rect fill="#F5C2C7" height="85.1875" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="190.5908" x="554.63" y="44.2969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="70.834" x="564.63" y="67.292">Tue 10:00</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="150.7119" x="564.63" y="83.5889">Bulk automation runs</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="103.4997" x="564.63" y="99.8857">&#10060; wrong query</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="170.5908" x="564.63" y="116.1826">80 issues auto-closed</text></g><!--entity T4--><g class="entity" data-qualified-name="T4" data-source-line="15" id="ent0005"><rect fill="#FFF8D6" height="68.8906" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="160.1162" x="448.87" y="189.4869"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="70.834" x="458.87" y="212.482">Tue 10:05</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="132.4941" x="458.87" y="228.7789">`dolt log --oneline`</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="140.1162" x="458.87" y="245.0757">see the bad commit</text></g><!--entity T5--><g class="entity" data-qualified-name="T5" data-source-line="16" id="ent0006"><rect fill="#C4E2AC" height="68.8906" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="212.5137" x="201.67" y="189.4869"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="70.834" x="211.67" y="212.482">Tue 10:06</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="192.5137" x="211.67" y="228.7789">`dolt reset --hard HEAD~1`</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="108.5615" x="211.67" y="245.0757">reverts task DB</text></g><!--entity T6--><g class="entity" data-qualified-name="T6" data-source-line="17" id="ent0007"><rect fill="#C4E2AC" height="68.8906" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="159.8564" x="7" y="189.4869"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="70.834" x="17" y="212.482">Tue 10:07</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="101.4316" x="17" y="228.7789">`bd dolt push`</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="139.8564" x="17" y="245.0757">shares the recovery</text></g><g class="entity" data-qualified-name="GMN15" data-source-line="26" id="ent0016"><path d="M644.19,196.2369 L644.19,251.6353 A0,0 0 0 0 644.19,251.6353 L897.6602,251.6353 A0,0 0 0 0 897.6602,251.6353 L897.6602,206.2369 L887.6602,196.2369 L750.69,196.2369 L687.55,129.8769 L742.69,196.2369 L644.19,196.2369 A0,0 0 0 0 644.19,196.2369" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M887.6602,196.2369 L887.6602,206.2369 L897.6602,206.2369 L887.6602,196.2369" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="232.4702" x="650.19" y="213.3038">With Linear/Jira this is "call support,</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="226.9478" x="650.19" y="228.4366">hope for the best." With beads it is</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="154.2988" x="650.19" y="243.5694">one git-style command.</text></g><!--link T1 to T2--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="19" id="lnk8"><path