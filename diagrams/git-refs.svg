<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="381px" preserveAspectRatio="none" style="width:1564px;height:381px;background:#FFFFFF;" version="1.1" viewBox="0 0 1564 381" width="1564px" zoomAndPan="magnify"><title>Git refs &#8212; named pointers under `.git/refs/`</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="344.6338" x="602.8984" y="22.9951">Git refs &#8212; named pointers under `.git/refs/`</text></g><!--entity ROOT--><g class="entity" data-qualified-name="ROOT" data-source-line="12" id="ent0002"><rect fill="#F4F4F4" height="36.2969" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="78.7412" x="665.01" y="44.2969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="58.7412" x="675.01" y="67.292">.git/refs/</text></g><!--entity HEADS--><g class="entity" data-qualified-name="HEADS" data-source-line="14" id="ent0003"><rect fill="#D9EDFF" height="134.0781" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="242.7627" x="7" y="140.5969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="85.2715" x="17" y="163.592">refs/heads/*</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="179.8889">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="110.0039" x="17" y="196.1857">Local branches.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="131.626" x="17" y="212.4826">main, feature-X, ...</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="17" y="228.7795">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="68.8379" x="17" y="245.0764">Used by:</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="144.04" x="90.2881" y="245.0764">git log, git checkout,</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="222.7627" x="17" y="261.3732">GitHub file browser, `git clone`.</text></g><!--entity REMOTES--><g class="entity" data-qualified-name="REMOTES" data-source-line="16" id="ent0004"><rect fill="#D9EDFF" height="134.0781" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="247.2539" x="284.75" y="140.5969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="179.8467" x="294.75" y="163.592">refs/remotes/&lt;remote&gt;/*</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="294.75" y="179.8889">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="190.4492" x="294.75" y="196.1857">Remote-tracking branches.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="217.5332" x="294.75" y="212.4826">origin/main, upstream/main, ...</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="294.75" y="228.7795">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="68.8379" x="294.75" y="245.0764">Used by:</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="119.9229" x="368.0381" y="245.0764">git fetch, git pull,</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="227.2539" x="294.75" y="261.3732">shown as 'origin/main' in git log.</text></g><!--entity TAGS--><g class="entity" data-qualified-name="TAGS" data-source-line="18" id="ent0005"><rect fill="#D9EDFF" height="134.0781" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="273.9414" x="567.41" y="140.5969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="73.2744" x="577.41" y="163.592">refs/tags/*</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="577.41" y="179.8889">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="197.8867" x="577.41" y="196.1857">Immutable named commits.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="176.6064" x="577.41" y="212.4826">v1.0, release-2026-04, ...</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="577.41" y="228.7795">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="68.8379" x="577.41" y="245.0764">Used by:</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="180.6533" x="650.6981" y="245.0764">git tag, git checkout v1.0,</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="159.4551" x="577.41" y="261.3732">GitHub Releases page.</text></g><!--entity PULL--><g class="entity" data-qualified-name="PULL" data-source-line="20" id="ent0006"><rect fill="#FFF8D6" height="134.0781" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="304.6484" x="876.06" y="140.5969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="133.5674" x="886.06" y="163.592">refs/pull/&lt;n&gt;/head</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="886.06" y="179.8889">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="177.7344" x="886.06" y="196.1857">GitHub-managed PR refs.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="284.6484" x="886.06" y="212.4826">Created automatically when a PR opens.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="886.06" y="228.7795">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="68.8379" x="886.06" y="245.0764">Used by:</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="123.6689" x="959.3481" y="245.0764">`gh pr checkout`,</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="249.1152" x="886.06" y="261.3732">hidden from the normal branch list.</text></g><!--entity DOLT--><g class="entity" data-qualified-name="DOLT" data-source-line="22" id="ent0007"><rect fill="#C4E2AC" height="134.0781" rx="3" ry="3" style="stroke:#666666;stroke-width:0.5;" width="282.0898" x="1215.34" y="140.5969"/><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="94.3906" x="1225.34" y="163.592">refs/dolt/data</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="1225.34" y="179.8889">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="207.0059" x="1225.34" y="196.1857">Dolt's custom namespace.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="246.0459" x="1225.34" y="212.4826">Holds the chunk store of a SQL DB.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="4.4502" x="1225.34" y="228.7795">&#160;</text><text fill="#000000" font-family="'Helvetica'" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="68.8379" x="1225.34" y="245.0764">Used by:</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="152.1953" x="1298.6281" y="245.0764">dolt push / dolt clone.</text><text fill="#000000" font-family="'Helvetica'" font-size="14" lengthAdjust="spacing" textLength="262.0898" x="1225.34" y="261.3732">Invisible to GitHub UI and `git clone`.</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="31" id="ent0014"><path d="M1155.33,334.6669 L1155.33,374.9325 A0,0 0 0 0 1155.33,374.9325 L1557.4306,374.9325 A0,0 0 0 0 1557.4306,374.9325 L1557.4306,344.6669 L1547.4306,334.6669 L1360.38,334.6669 L1356.38,274.8469 L1352.38,334.6669 L1155.33,334.6669 A0,0 0 0 0 1155.33,334.6669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1547.4306,334.6669 L1547.4306,344.6669 L1557.4306,344.6669 L1547.4306,334.6669" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="307.6201" x="1161.33" y="351.7338">Any tool can create refs under a custom prefix.</text><text fill="#000000" font-family="'Helvetica'" font-size="13" lengthAdjust="spacing" textLength="381.1006" x="1161.33" y="366.8666">The refs namespace is extensible &#8212; that's the whole trick.</text></g><!--link ROOT to HEADS--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="24" id="lnk8"><path d="M664.65,66.8569 C586.85,74.3169 409.57,95.1769 267.38,140.5969 C261.65,142.4269 261.4827,142.3429 255.6827,144.5029" fill="none" id="ROOT-to-HEADS" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="250.06,146.5969,259.8901,147.2044,254.7456,144.8519,257.0981,139.7074,250.06,146.5969" style="stroke:#181818;stroke-width:1;"/></g><!--link ROOT to REMOTES--><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="dependency" data-source-line="25" id="lnk9"><path d="M668.09,81.0069 C634.12,97.4269 586.8013,120.3242 537.7013,144.0742" fill="none" id="ROOT-to-REMOTES" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="532.3,146.6869,542.1437,146.3688,536.8011,144.5097,538.6602,139.167,532.3,146.6869" style="stroke:#181818;stroke-width:1;"/></g><!--link ROOT to TAGS--><g class="link" data-entity-1="ent0002" data-entity-2="ent0005" data-link-type="dependency" data-source-line="26" id="lnk10"><path d="M704.38,81.0069 C704.38,95.9369 704.38,112.3769 704.38,134.1769" fill="none" id="ROOT-to-TAGS" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="704.38,140.1769,708.38,131.1769,704.38,135.1769,700.38,131.1769,704.38,140.1769" style="stroke:#181818;stroke-width:1;"/></g><!--link ROOT to PULL--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="27" id="lnk11"><path d="M744.11,81.0069 C777.91,95.9369 823.1922,115.9512 872.5122,137.7512" fill="none" id="ROOT-to-PULL" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="878,140.1769,871.3854,132.8798,873.4268,138.1555,868.1512,140.1969,878,140.1769" style="stroke:#181818;stroke-width:1;"/></g><!--link ROOT to DOLT--><g class="link" data-entity-1="ent0002" data-entity-2="ent0007" data-link-type="dependency" data-source-line="28" id="lnk12"><path d="M744.14,66.3869 C828.96,73.3669 1033.41,93.9769 1198.38,140.5969 C1203.82,142.1269 1203.6096,141.9555 1209.1296,143.7355" fill="none" id="ROOT-to-DOLT" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="1214.84,145.5769,1207.5019,139.0078,1210.0813,144.0424,1205.0467,146.6217,1214.84,145.5769" style="stroke:#181818;stroke-width:1;"/></g><?plantuml-src VPJDQXin4CVl-nH3SWWOUpSDmRGb11n_n06tJXq7Ul31ibQx4jPAYwID4qgX3z4dx9Dq93cEZKbsBz9eDFERlqPomaa6jyA1OOM5Vt_-WY8Low